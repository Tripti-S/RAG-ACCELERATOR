# Railway deployment config — Frontend (Streamlit)
# Uses the existing Dockerfile. Railway sets $PORT automatically.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "streamlit run app.py --server.port=${PORT:-8501} --server.address=0.0.0.0 --server.headless=true --server.fileWatcherType=none --browser.gatherUsageStats=false"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
